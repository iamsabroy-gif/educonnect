services:
  - type: web
    name: educonnect
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: DATABASE_URL
        sync: false # paste the Neon pooled connection URL in the Render dashboard
